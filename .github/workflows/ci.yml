name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies
        # PortAudio is required by `sounddevice` (used by audio_generator)
        # for playback in tests. Without it pytest collection fails on
        # 28 tests that transitively import core.audio_generator.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libportaudio2 \
            libsndfile1 \
            ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-minimal.txt
          pip install -r requirements-dev.txt

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Run tests
        # tests/e2e/ requires running services (LM Studio, PostgreSQL, etc.)
        # and is excluded from CI. Developers can run them locally with
        # 'pytest tests/e2e/ -m \"not slow\"'.
        run: pytest tests/ -m "not slow" --ignore=tests/e2e --cov --cov-report=term-missing
